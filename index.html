<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luna en Lesbos - Galería Masonry</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    font-family:'Montserrat', sans-serif;
    overflow-x:hidden;
}

/* ===== GALERÍA ===== */

.luna-gallery{
    background:#050505;
    padding:100px 20px;
    overflow:hidden;
}

/* ===== HEADER ===== */

.gallery-header{
    text-align:center;
    margin-bottom:70px;
}

.gallery-tag{
    display:inline-block;
    padding:10px 24px;
    border-radius:50px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.03);
    color:#cfa7ff;
    font-size:14px;
    letter-spacing:1px;
    margin-bottom:25px;
    backdrop-filter:blur(10px);
}

.gallery-header h2{
    color:white;
    font-size:clamp(2.4rem, 5vw, 5rem);
    line-height:1.1;
    font-weight:800;
    margin-bottom:25px;
}

.gallery-header p{
    color:#b8b8b8;
    font-size:18px;
    line-height:1.7;
    max-width:700px;
    margin:auto;
}

/* ===== MASONRY ===== */

.masonry-gallery{
    column-count:4;
    column-gap:18px;
    max-width:1500px;
    margin:auto;
}

.gallery-item{
    position:relative;
    overflow:hidden;
    border-radius:24px;
    margin-bottom:18px;
    break-inside:avoid;
    cursor:pointer;
    background:#111;
}

.gallery-item img{
    width:100%;
    display:block;
    border-radius:24px;
    transition:0.6s ease;
}

/* Hover Zoom */

.gallery-item:hover img{
    transform:scale(1.05);
    filter:brightness(1.08);
}

/* Overlay Glow */

.gallery-item::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,0.55),
        transparent
    );
    opacity:0;
    transition:0.4s;
}

.gallery-item:hover::after{
    opacity:1;
}

/* Glow effect */

.gallery-item:hover{
    box-shadow:
    0 0 25px rgba(178,111,255,0.25),
    0 0 60px rgba(178,111,255,0.15);
}

/* ===== RESPONSIVE ===== */

@media(max-width:1100px){

    .masonry-gallery{
        column-count:3;
    }

}

@media(max-width:768px){

    .masonry-gallery{
        column-count:2;
    }

    .luna-gallery{
        padding:80px 15px;
    }

}

@media(max-width:500px){

    .masonry-gallery{
        column-count:1;
    }

    .gallery-header h2{
        font-size:2.3rem;
    }

    .gallery-header p{
        font-size:16px;
    }

}

</style>
</head>

<body>

<section class="luna-gallery">

    <div class="gallery-header">

        <span class="gallery-tag">
            🌙 Momentos Luna
        </span>

        <h2>
            No era solo una fiesta.<br>
            Era el espacio que nos faltaba.
        </h2>

        <p>
            Más de 500 mujeres ya han vivido la experiencia Luna.
        </p>

    </div>

    <div class="masonry-gallery">

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=1200&auto=format&fit=crop" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1501386761578-eac5c94b800a?q=80&w=1200&auto=format&fit=crop" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1200&auto=format&fit=crop" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1515169067868-5387ec356754?q=80&w=1200&auto=format&fit=crop" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1521334884684-d80222895322?q=80&w=1200&auto=format&fit=crop" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1517457373958-b7bdd4587205?q=80&w=1200&auto=format&fit=crop" alt="">
        </div>

    </div>

</section>

</body>
</html>
